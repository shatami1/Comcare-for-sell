<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Login - ComfortCare (DEMO)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            padding: 50px;
            max-width: 450px;
            width: 100%;
        }

        .login-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .login-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        .login-title {
            font-size: 32px;
            font-weight: 700;
            color: #333;
            margin-bottom: 10px;
        }

        .login-subtitle {
            color: #666;
            font-size: 16px;
        }

        .demo-badge {
            background: #ffc107;
            color: #333;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            display: inline-block;
            margin-top: 10px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }

        .form-input {
            width: 100%;
            padding: 14px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s;
            outline: none;
        }

        .form-input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .login-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .success-message {
            background: #d4edda;
            color: #155724;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            font-size: 14px;
        }

        .success-message.show {
            display: block;
        }

        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            font-size: 14px;
        }

        .error-message.show {
            display: block;
        }

        .help-text {
            text-align: center;
            margin-top: 25px;
            color: #666;
            font-size: 14px;
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
        }

        .help-text strong {
            display: block;
            margin-bottom: 10px;
            color: #333;
        }

        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            text-align: center;
            width: 100%;
        }

        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <div class="login-icon">🚚</div>
            <h1 class="login-title">Agent Portal</h1>
            <p class="login-subtitle">Sign in to manage your deliveries</p>
            <span class="demo-badge">🎮 DEMO MODE</span>
        </div>

        <div id="successMessage" class="success-message"></div>
        <div id="errorMessage" class="error-message"></div>

        <form id="agentLoginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label class="form-label" for="agentId">Agent ID</label>
                <input 
                    type="text" 
                    id="agentId" 
                    name="agentId" 
                    class="form-input" 
                    placeholder="Try: AG-001" 
                    value="AG-001"
                    required
                    autocomplete="username"
                >
            </div>

            <div class="form-group">
                <label class="form-label" for="pin">PIN Code</label>
                <input 
                    type="password" 
                    id="pin" 
                    name="pin" 
                    class="form-input" 
                    placeholder="Try: 1234" 
                    value="1234"
                    maxlength="4"
                    required
                    autocomplete="current-password"
                >
            </div>

            <button type="submit" class="login-btn" id="loginBtn">
                Sign In
            </button>
        </form>

        <div class="help-text">
            <strong>Demo Credentials:</strong>
            Agent ID: <strong>AG-001</strong> / PIN: <strong>1234</strong><br>
            <em style="font-size: 12px; color: #666; margin-top: 5px; display: block;">You'll only see YOUR orders (not other agents' data)</em>
        </div>

        <a href="index.html" class="back-link">← Back to Home</a>
    </div>

    <script>
        function handleLogin(event) {
            event.preventDefault();

            const agentId = document.getElementById('agentId').value.trim();
            const pin = document.getElementById('pin').value.trim();
            const errorMessage = document.getElementById('errorMessage');
            const successMessage = document.getElementById('successMessage');
            const loginBtn = document.getElementById('loginBtn');

            // Clear previous messages
            errorMessage.classList.remove('show');
            successMessage.classList.remove('show');

            // Demo mode - check credentials locally
            if (agentId === 'AG-001' && pin === '1234') {
                // Success!
                successMessage.textContent = '✅ Login successful! Loading your orders...';
                successMessage.classList.add('show');
                
                loginBtn.disabled = true;
                loginBtn.textContent = 'Logging in...';

                // Store demo session
                localStorage.setItem('demo_agent_session', JSON.stringify({
                    role: 'agent',
                    agentId: 'AG-001',
                    name: 'John Delivery',
                    email: 'john@comcare.store',
                    zone: 'Atlanta Metro',
                    loginTime: new Date().toISOString()
                }));

                // Redirect to agent dashboard after short delay
                setTimeout(() => {
                    window.location.href = 'agent-dashboard-demo.html';
                }, 1000);
            } else {
                // Failed
                errorMessage.textContent = '❌ Invalid Agent ID or PIN. Try: AG-001 / 1234';
                errorMessage.classList.add('show');
            }
        }
    </script>
</body>
</html>
