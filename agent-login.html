<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Login - ComfortCare</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            padding: 50px;
            max-width: 450px;
            width: 100%;
        }

        .login-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .login-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        .login-title {
            font-size: 32px;
            font-weight: 700;
            color: #333;
            margin-bottom: 10px;
        }

        .login-subtitle {
            color: #666;
            font-size: 16px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }

        .form-input {
            width: 100%;
            padding: 14px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s;
            outline: none;
        }

        .form-input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .login-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            font-size: 14px;
        }

        .error-message.show {
            display: block;
        }

        .help-text {
            text-align: center;
            margin-top: 25px;
            color: #666;
            font-size: 14px;
        }

        .help-link {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }

        .help-link:hover {
            text-decoration: underline;
        }

        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            text-align: center;
            width: 100%;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        .loading-spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
            margin-right: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <div class="login-icon">🚚</div>
            <h1 class="login-title">Agent Portal</h1>
            <p class="login-subtitle">Sign in to manage your deliveries</p>
        </div>

        <div id="errorMessage" class="error-message"></div>

        <form id="agentLoginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label class="form-label" for="agentId">Agent ID</label>
                <input 
                    type="text" 
                    id="agentId" 
                    name="agentId" 
                    class="form-input" 
                    placeholder="Enter your Agent ID" 
                    required
                    autocomplete="username"
                >
            </div>

            <div class="form-group">
                <label class="form-label" for="pin">PIN Code</label>
                <input 
                    type="password" 
                    id="pin" 
                    name="pin" 
                    class="form-input" 
                    placeholder="Enter your 4-digit PIN" 
                    maxlength="4"
                    pattern="[0-9]{4}"
                    required
                    autocomplete="current-password"
                >
            </div>

            <button type="submit" class="login-btn" id="loginBtn">
                Sign In
            </button>
        </form>

        <div class="help-text">
            Forgot your PIN? <a href="mailto:support@comcare.store" class="help-link">Contact Support</a>
        </div>

        <a href="index.html" class="back-link">← Back to Home</a>
    </div>

    <script src="auth-system.js"></script>
    <script>
        async function handleLogin(event) {
            event.preventDefault();

            const agentId = document.getElementById('agentId').value.trim();
            const pin = document.getElementById('pin').value.trim();
            const errorMessage = document.getElementById('errorMessage');
            const loginBtn = document.getElementById('loginBtn');

            // Clear previous errors
            errorMessage.classList.remove('show');

            // Validate inputs
            if (!agentId || !pin) {
                showError('Please enter both Agent ID and PIN');
                return;
            }

            if (pin.length !== 4 || !/^\d+$/.test(pin)) {
                showError('PIN must be exactly 4 digits');
                return;
            }

            // Show loading state
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<span class="loading-spinner"></span> Signing in...';

            try {
                // Attempt login
                const result = await auth.loginAgent(agentId, pin);

                if (result.success) {
                    // Success! Redirect to agent dashboard
                    const returnUrl = new URLSearchParams(window.location.search).get('return');
                    window.location.href = returnUrl || 'agent-dashboard.html';
                } else {
                    // Login failed
                    showError(result.error || 'Invalid Agent ID or PIN');
                    loginBtn.disabled = false;
                    loginBtn.innerHTML = 'Sign In';
                }
            } catch (error) {
                console.error('Login error:', error);
                showError('Login failed. Please try again.');
                loginBtn.disabled = false;
                loginBtn.innerHTML = 'Sign In';
            }
        }

        function showError(message) {
            const errorMessage = document.getElementById('errorMessage');
            errorMessage.textContent = message;
            errorMessage.classList.add('show');
        }

        // Check if already logged in
        window.addEventListener('DOMContentLoaded', () => {
            const currentUser = auth.getCurrentUser();
            if (currentUser && currentUser.role === 'agent') {
                // Already logged in, redirect to dashboard
                window.location.href = 'agent-dashboard.html';
            }
        });
    </script>
</body>
</html>
